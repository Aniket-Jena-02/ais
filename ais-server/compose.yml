services:
  db:
    image: mongo:latest
    container_name: ais_db
    ports:
      - "27017:27017"
    volumes:
      - ais_db:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    networks:
      - ais_network

  cache:
    image: redis:latest
    container_name: ais_cache
    ports:
      - "6379:6379"
    networks:
      - ais_network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ais_server
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://root:root@db:27017/ais_db?authSource=admin
      - REDIS_URI=redis://cache:6379
      - JWT_SECRET=secret
    depends_on:
      - db
      - cache
    networks:
      - ais_network

volumes:
  ais_db:
  ais_cache:


networks:
  ais_network:
    driver: bridge
